components:
  schemas:
    EquipmentRequest:
      type: object
      properties:
        name:
          type: string
        capacity:
          type: string
        merk:
          type: string
        condition:
          type: string
        location:
          type: string
        ownership_status:
          type: string
        evidence:
          type: string
      required:
        - name
        - capacity
        - merk
        - condition
        - ownership_status

    EquipmentResponse:
      allOf:
        - type: object
          properties:
            id:
              type: string
            name:
              type: string
            capacity:
              type: string
            merk:
              type: string
            condition:
              type: string
            location:
              type: string
            ownership_status:
              type: string
            evidence:
              type: string
        - $ref: './Workspace.yaml#/components/schemas/AuditFields'
